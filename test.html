<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Core-IA Hub · Le Média de l'IA Souveraine</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700;1,800&family=Space+Mono:ital,wght@0,400;0,700;1,400&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #03040b; --bg2: #070a18; --bg-card: rgba(13,15,43,0.6);
    --blue: #3b5bff; --blue-dim: rgba(59,91,255,0.12);
    --violet: #7c5cfc; --cyan: #4fc3f7; --green: #00ff88;
    --red: #ff4757; --text: #e8eaff; --muted: #6b72a8;
    --border: rgba(124,92,252,0.15); --border-bright: rgba(59,91,255,0.4);
    --serif: 'Playfair Display', Georgia, serif; --mono: 'Space Mono', monospace;
    --radius: 12px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 13px; line-height: 1.65; overflow-x: hidden; }
  body::before {
    content: ''; position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none; z-index: 9999; opacity: 0.35;
  }
  .orb { position: fixed; border-radius: 50%; filter: blur(130px); pointer-events: none; z-index: 0; }
  .orb1 { width: 700px; height: 700px; background: radial-gradient(circle, rgba(59,91,255,0.1) 0%, transparent 70%); top: -250px; left: -250px; }
  .orb2 { width: 500px; height: 500px; background: radial-gradient(circle, rgba(124,92,252,0.09) 0%, transparent 70%); bottom: -100px; right: -100px; }
  .breaking-bar { background: linear-gradient(90deg, var(--blue), var(--violet)); padding: 7px 0; overflow: hidden; position: relative; z-index: 10; }
  .ticker { display: flex; white-space: nowrap; padding-left: 72px; animation: tick 38s linear infinite; }
  .ticker span { font-family: var(--mono); font-size: 0.65rem; color: rgba(255,255,255,0.9); padding-right: 3.5rem; }
  @keyframes tick { 0%{transform:translateX(0)} 100%{transform:translateX(-50%)} }
  header { padding: 1rem 3rem; border-bottom: 1px solid var(--border); background: rgba(3,4,11,0.88); backdrop-filter: blur(20px); position: sticky; top: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; }
  .logo { font-family: var(--mono); font-size: 0.95rem; font-weight: 700; color: #fff; text-decoration: none; letter-spacing: 4px; }
  .nav-link { font-family: var(--mono); font-size: 0.6rem; letter-spacing: 2px; padding: 6px 14px; border-radius: 5px; text-decoration: none; color: var(--muted); cursor: pointer; }
  .nav-link.active { color: var(--cyan); background: var(--blue-dim); }
  .nav-cta { background: var(--blue); color: #fff; padding: 7px 16px; border-radius: 6px; font-size: 0.6rem; text-decoration: none; }
  .page { display: none; } .page.active { display: block; }
  .media-layout, .forum-layout { max-width: 1400px; margin: 0 auto; padding: 2.5rem 3rem; display: grid; gap: 2.5rem; position: relative; z-index: 1; }
  .media-layout { grid-template-columns: 1fr 310px; }
  .hero { grid-column: span 2; position: relative; border-radius: 16px; overflow: hidden; height: 500px; border: 1px solid var(--border); display: block; }
  .hero-bg { position: absolute; inset: 0; background-size: cover; background-position: center; transition: opacity 0.6s ease; }
  .hero-content { position: absolute; bottom: 0; padding: 2.5rem 3rem; max-width: 800px; z-index: 2; }
  .hero-content h1 { font-family: var(--serif); font-size: 3.2rem; line-height: 1.08; margin-bottom: 1rem; }
  .article-card { display: grid; grid-template-columns: 130px 1fr; gap: 1.2rem; padding: 1.2rem 0; border-bottom: 1px solid var(--border); text-decoration: none; color: inherit; }
  .card-thumb { width: 130px; height: 88px; border-radius: 6px; background-size: cover; background-position: center; border: 1px solid var(--border); }
  .card-body h3 { font-family: var(--serif); font-size: 1.02rem; font-weight: 700; }
  .widget { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.3rem; margin-bottom: 1.5rem; }
  .widget-title { font-family: var(--mono); font-size: 0.56rem; letter-spacing: 3px; color: var(--cyan); text-transform: uppercase; margin-bottom: 1rem; border-bottom: 1px solid var(--border); padding-bottom: 5px; }
  .hero-progress { position: absolute; bottom: 0; left: 0; width: 100%; height: 3px; background: rgba(255,255,255,0.1); }
  .hero-progress-bar { height: 100%; background: var(--cyan); width: 0%; }
  .hero-dots { position: absolute; bottom: 30px; right: 3rem; display: flex; gap: 8px; z-index: 10; }
  .hero-dot { width: 8px; height: 8px; border-radius: 50%; background: rgba(255,255,255,0.2); border: none; cursor: pointer; }
  .hero-dot.active { background: var(--cyan); width: 22px; border-radius: 4px; }
  .src-btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--muted); padding: 6px 12px; border-radius: 4px; cursor: pointer; font-family: var(--mono); font-size: 0.55rem; }
  .src-btn.active { border-color: var(--blue); color: var(--cyan); }
</style>
</head>
<body>

<div class="orb orb1"></div>
<div class="orb orb2"></div>

<div class="breaking-bar">
  <div class="ticker" id="ticker-feed">
    <span>Chargement des dernières brèves...</span>
  </div>
</div>

<header>
  <a href="#" class="logo" onclick="showPage('media')">CORE-IA HUB <span style="font-size:0.5rem; background:var(--blue); padding:2px 5px; border-radius:3px; vertical-align:middle">BETA</span></a>
  <nav>
    <a class="nav-link active" id="nav-media" onclick="showPage('media')">ACTUS</a>
    <a class="nav-link" id="nav-forum" onclick="showPage('forum')">FORUM</a>
    <a href="#" class="nav-cta">S'INSCRIRE</a>
  </nav>
</header>

<div class="page active" id="page-media">
  <div class="media-layout">
    <div class="hero" id="hero-link">
      <div class="hero-bg" id="hero-bg"></div>
      <div class="hero-content">
        <span class="tag" id="hero-tag" style="background:var(--blue); padding:2px 8px; border-radius:3px; font-size:0.6rem">A LA UNE</span>
        <h1 id="hero-title">Récupération des flux...</h1>
        <a href="#" id="hero-read-more" target="_blank" style="color:var(--cyan); text-decoration:none; font-size:0.8rem">LIRE LA SUITE →</a>
      </div>
      <div class="hero-dots" id="hero-dots"></div>
      <div class="hero-progress"><div class="hero-progress-bar" id="hero-progress-bar"></div></div>
    </div>

    <main>
      <div style="margin: 2rem 0 1rem; display:flex; gap:10px; flex-wrap:wrap" id="source-btns">
        <button class="src-btn active" data-src="0">Numerama</button>
        <button class="src-btn" data-src="4">Hugging Face</button>
        <button class="src-btn" data-src="6">VentureBeat</button>
      </div>
      <div id="rss-loading" style="display:none">⏳ Chargement...</div>
      <div id="rss-feed"></div>
    </main>

    <aside>
      <div class="widget">
        <div class="widget-title">INFRA STATUS</div>
        <div style="color:var(--green); font-size:0.6rem"><span style="display:inline-block; width:7px; height:7px; background:var(--green); border-radius:50%"></span> NODE-L3 : ONLINE</div>
      </div>
    </aside>
  </div>
</div>

<div class="page" id="page-forum">
  <div class="forum-layout">
    <nav><div class="widget-title">CATÉGORIES</div><a href="#" class="nav-link active">🏠 Accueil</a></nav>
    <main><h2>Forum Core-IA</h2><p style="color:var(--muted)">Espace de discussion démo (Supabase déconnecté).</p></main>
  </div>
</div>

<script>
  const SOURCES = [
    { name: 'Numerama', url: 'https://www.numerama.com/tag/intelligence-artificielle/feed/', cls: 'tag-green' },
    {}, {}, {},
    { name: 'Hugging Face', url: 'https://huggingface.co/blog/feed.xml', cls: 'tag-violet' },
    {},
    { name: 'VentureBeat', url: 'https://venturebeat.com/category/ai/feed/', cls: 'tag-cyan' }
  ];
  const PROXY = 'https://api.rss2json.com/v1/api.json?rss_url=';
  let heroPool = [];
  let heroIdx = 0;
  let heroTimer = null;

  const getImg = (it) => it.thumbnail || it.enclosure?.link || `https://picsum.photos/seed/${encodeURIComponent(it.title)}/800/600`;

  async function loadRSS(idx) {
    const src = SOURCES[idx];
    document.getElementById('rss-loading').style.display = 'block';
    try {
      const r = await fetch(PROXY + encodeURIComponent(src.url));
      const d = await r.json();
      document.getElementById('rss-loading').style.display = 'none';
      if(d.status === 'ok') {
        renderFeed(d.items, src);
        heroPool = d.items.slice(0,6).map(it => ({...it, _src: src}));
        initHero();
      }
    } catch(e) { document.getElementById('rss-loading').style.display = 'none'; }
  }

  function renderFeed(items, src) {
    const feed = document.getElementById('rss-feed');
    feed.innerHTML = items.slice(0,8).map(it => `
      <a href="${it.link}" target="_blank" class="article-card">
        <div class="card-thumb" style="background-image:url('${getImg(it)}')"></div>
        <div class="card-body"><h3>${it.title}</h3><p style="color:var(--muted); font-size:0.7rem">${it.description.replace(/<[^>]*>?/gm, '').slice(0,100)}...</p></div>
      </a>`).join('');
  }

  function initHero() {
    renderHero();
    clearInterval(heroTimer);
    heroTimer = setInterval(() => { heroIdx = (heroIdx+1)%heroPool.length; renderHero(); }, 6000);
  }

  function renderHero() {
    if(!heroPool.length) return;
    const it = heroPool[heroIdx];
    const bg = document.getElementById('hero-bg');
    bg.style.opacity = 0;
    setTimeout(() => {
      bg.style.backgroundImage = `linear-gradient(to bottom,rgba(3,4,11,0.1),rgba(3,4,11,0.9)), url('${getImg(it)}')`;
      bg.style.opacity = 1;
    }, 200);
    document.getElementById('hero-title').textContent = it.title;
    document.getElementById('hero-tag').textContent = it._src.name;
    document.getElementById('hero-read-more').href = it.link;
    document.getElementById('hero-dots').innerHTML = heroPool.map((_,i)=>`<button class="hero-dot ${i===heroIdx?'active':''}" onclick="heroIdx=${i};renderHero()"></button>`).join('');
    
    const bar = document.getElementById('hero-progress-bar');
    bar.style.transition = 'none'; bar.style.width = '0%';
    setTimeout(() => { bar.style.transition = 'width 6s linear'; bar.style.width = '100%'; }, 50);
  }

  function showPage(p) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById('page-'+p).classList.add('active');
  }

  document.querySelectorAll('.src-btn').forEach(btn => {
    btn.addEventListener('click', function() {
      document.querySelectorAll('.src-btn').forEach(b => b.classList.remove('active'));
      this.classList.add('active');
      loadRSS(this.dataset.src);
    });
  });

  loadRSS(0);
</script>
</body>
</html>
